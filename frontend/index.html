<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bäume in Wien</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Bäume in Wien</h1>
  <div id="controls">
    <div id="filters">
      <select id="group-filter">
        <option value="">Alle Baumarten</option>
        <option value="Andere">Andere Baumarten</option>
      </select>
      <div id="year-inputs">
        <input type="number" id="year-from" placeholder="Jahr von" min="1800" max="2030" />
        <input type="number" id="year-to" placeholder="Jahr bis" min="1800" max="2030" />
      </div>
    </div>
    <button id="locate-btn">Standort</button>
  </div>
</header>

<div id="map-wrap">
  <div id="map"></div>
  <div id="status" class="hidden"></div>
  <div id="popup-card" class="hidden">
    <div id="popup-species"></div>
    <div id="popup-details"></div>
  </div>
</div>

<script>
const API = "https://trees.maxheinze.eu/api";
const MOBILE_BREAKPOINT = 768;

const GROUP_COLORS = {
  "Ahorn":    "#93c5fd",
  "Linde":    "#fde047",
  "Eiche":    "#86efac",
  "Platane":  "#6ee7b7",
  "Kastanie": "#fcd34d",
  "Kirsche":  "#f9a8d4",
  "Esche":    "#7dd3fc",
  "Birke":    "#e5e7eb",
  "Pappel":   "#a7f3d0",
  "Pflaume":  "#c4b5fd",
};
const DEFAULT_COLOR = "#d1d5db";

function groupColor(group) {
  return (group && GROUP_COLORS[group]) || DEFAULT_COLOR;
}

function isMobile() {
  return window.innerWidth < MOBILE_BREAKPOINT;
}

// ── Map ───────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  center: [16.3738, 48.2082],
  zoom: 13,
  minZoom: 10,
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

const statusEl  = document.getElementById("status");
const groupSel  = document.getElementById("group-filter");
const yearFrom  = document.getElementById("year-from");
const yearTo    = document.getElementById("year-to");
const popupCard = document.getElementById("popup-card");
const locateBtn = document.getElementById("locate-btn");

let fetchTimer       = null;
let watchId          = null;
let locationMarker   = null;
let accuracyCircle   = null;
let locating         = false;

// ── Load groups ───────────────────────────────────────────────────────
async function loadGroups() {
  const res  = await fetch(`${API}/groups`);
  const data = await res.json();
  // Insert after the first two static options
  const insertBefore = groupSel.options[1]; // "Andere Baumarten"
  data.groups.forEach(g => {
    const opt = document.createElement("option");
    opt.value = g;
    opt.textContent = g;
    groupSel.insertBefore(opt, insertBefore);
  });
}

// ── Fetch trees ───────────────────────────────────────────────────────
async function fetchTrees() {
  const bounds = map.getBounds();
  const params = new URLSearchParams({
    minlat: bounds.getSouth().toFixed(6),
    minlon: bounds.getWest().toFixed(6),
    maxlat: bounds.getNorth().toFixed(6),
    maxlon: bounds.getEast().toFixed(6),
  });
  if (groupSel.value)  params.set("group", groupSel.value);
  if (yearFrom.value)  params.set("year_from", yearFrom.value);
  if (yearTo.value)    params.set("year_to", yearTo.value);

  setStatus("Lade…");
  try {
    const res  = await fetch(`${API}/trees?${params}`);
    const data = await res.json();
    if (data.error === "zoom") {
      setStatus("Bitte weiter heranzoomen.");
      clearTrees();
      return;
    }
    renderTrees(data.trees);
    setStatus(`${data.count} Bäume`);
  } catch {
    setStatus("Fehler beim Laden.");
  }
}

function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("hidden", !msg);
}

function clearTrees() {
  if (map.getSource("trees")) {
    map.getSource("trees").setData({ type: "FeatureCollection", features: [] });
  }
}

// ── Render ────────────────────────────────────────────────────────────
function colorExpression() {
  const expr = ["match", ["get", "group"]];
  Object.entries(GROUP_COLORS).forEach(([g, c]) => expr.push(g, c));
  expr.push(DEFAULT_COLOR);
  return expr;
}

function renderTrees(trees) {
  const geojson = {
    type: "FeatureCollection",
    features: trees.map(t => ({
      type: "Feature",
      geometry: { type: "Point", coordinates: [t.lon, t.lat] },
      properties: t,
    })),
  };

  if (map.getSource("trees")) {
    map.getSource("trees").setData(geojson);
    return;
  }

  map.addSource("trees", { type: "geojson", data: geojson });

  // Stem layer — thin brown rectangle below each dot
  map.addLayer({
    id: "trees-stems",
    type: "circle",
    source: "trees",
    minzoom: 14,
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 14, 1.5, 18, 2.5],
      "circle-color": "#92400e",
      "circle-translate": ["interpolate", ["linear"], ["zoom"],
        14, ["literal", [0, 6]],
        18, ["literal", [0, 11]]
      ],
      "circle-opacity": 0.7,
    },
  });

  // Main dot layer
  map.addLayer({
    id: "trees-circles",
    type: "circle",
    source: "trees",
    minzoom: 14,
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 14, 4, 18, 9],
      "circle-color": colorExpression(),
      "circle-stroke-width": 1.5,
      "circle-stroke-color": "rgba(0,0,0,0.18)",
    },
  });

  // Label layer for lower zoom levels
  map.addLayer({
    id: "trees-labels",
    type: "symbol",
    source: "trees",
    minzoom: 10,
    maxzoom: 14,
    layout: {
      "text-field": ["coalesce", ["get", "group"], "•"],
      "text-font": ["Open Sans Regular", "Arial Unicode MS Regular"],
      "text-size": ["interpolate", ["linear"], ["zoom"], 10, 9, 13, 11],
      "text-allow-overlap": false,
      "text-ignore-placement": false,
      "text-padding": 2,
    },
    paint: {
      "text-color": "#111827",
      "text-halo-color": colorExpression(),
      "text-halo-width": 8,
      "text-halo-blur": 0,
    },
  });

  // Click handlers
  map.on("click", "trees-circles", e => {
    e.preventDefault();
    showPopup(e.features[0], e.point);
  });
  map.on("click", "trees-labels", e => {
    e.preventDefault();
    showPopup(e.features[0], e.point);
  });

  map.on("mouseenter", "trees-circles", () => map.getCanvas().style.cursor = "pointer");
  map.on("mouseleave", "trees-circles", () => map.getCanvas().style.cursor = "");
  map.on("mouseenter", "trees-labels",  () => map.getCanvas().style.cursor = "pointer");
  map.on("mouseleave", "trees-labels",  () => map.getCanvas().style.cursor = "");

  // Close on background click
  map.on("click", e => {
    const hits = map.queryRenderedFeatures(e.point, {
      layers: ["trees-circles", "trees-labels"]
    });
    if (!hits.length) closePopup();
  });
}

// ── Popup ─────────────────────────────────────────────────────────────
function showPopup(feature, point) {
  const p = feature.properties;

  document.getElementById("popup-species").textContent = p.species || "Unbekannte Art";

  const fields = [
    ["📅 Gepflanzt",    p.year_planted || null],
    ["📏 Höhe",         p.height_class || null],
    ["🌿 Krone",        p.crown_diameter || null],
    ["🪵 Stammumfang",  p.trunk_circumference ? `${p.trunk_circumference} cm` : null],
  ];

  const detailsEl = document.getElementById("popup-details");
  detailsEl.innerHTML = "";
  fields.forEach(([label, value]) => {
    if (!value) return;
    const row = document.createElement("div");
    row.className = "popup-row";
    row.innerHTML = `<span class="popup-label">${label}</span><span class="popup-value">${value}</span>`;
    detailsEl.appendChild(row);
  });

  popupCard.style.borderTop = `4px solid ${groupColor(p.group)}`;
  popupCard.classList.remove("hidden");

  if (isMobile()) {
    // On mobile: center map on tree, popup stays at bottom
    popupCard.style.position  = "absolute";
    popupCard.style.bottom    = "72px";
    popupCard.style.left      = "50%";
    popupCard.style.transform = "translateX(-50%)";
    popupCard.style.top       = "";

    const coords = feature.geometry.coordinates;
    map.easeTo({ center: coords, duration: 300 });
  } else {
    // On desktop: float near clicked point, collision-aware
    positionPopupNearPoint(point);
  }
}

function positionPopupNearPoint(point) {
  // Reset so we can measure natural size
  popupCard.style.position  = "absolute";
  popupCard.style.left      = "-9999px";
  popupCard.style.top       = "-9999px";
  popupCard.style.bottom    = "";
  popupCard.style.transform = "";

  const mapWrap   = document.getElementById("map-wrap");
  const wrapRect  = mapWrap.getBoundingClientRect();
  const cardW     = popupCard.offsetWidth;
  const cardH     = popupCard.offsetHeight;
  const gap       = 12; // px gap between dot and popup
  const margin    = 12; // min distance from screen edge
  const dotOffset = 10; // approx dot radius in px

  // Preferred: below the dot
  let top = point.y + dotOffset + gap;
  // Flip above if too close to bottom
  if (top + cardH > wrapRect.height - margin) {
    top = point.y - dotOffset - gap - cardH;
  }

  // Horizontally centered on dot, clamped to edges
  let left = point.x - cardW / 2;
  left = Math.max(margin, Math.min(left, wrapRect.width - cardW - margin));

  popupCard.style.left = `${left}px`;
  popupCard.style.top  = `${top}px`;
}

function closePopup() {
  popupCard.classList.add("hidden");
}

// ── Live location ─────────────────────────────────────────────────────
function startLocating() {
  if (!navigator.geolocation) {
    alert("Geolokalisierung wird nicht unterstützt.");
    return;
  }

  if (locating) {
    // Toggle off
    stopLocating();
    return;
  }

  locating = true;
  locateBtn.classList.add("active");
  setStatus("Standort wird ermittelt…");

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { longitude, latitude, accuracy } = pos.coords;
      const lngLat = [longitude, latitude];

      // Fly on first fix
      if (!locationMarker) {
        map.flyTo({ center: lngLat, zoom: Math.max(map.getZoom(), 15), duration: 600 });
      }

      // Blue dot marker
      if (!locationMarker) {
        const el = document.createElement("div");
        el.className = "location-dot";
        locationMarker = new maplibregl.Marker({ element: el, anchor: "center" })
          .setLngLat(lngLat)
          .addTo(map);
      } else {
        locationMarker.setLngLat(lngLat);
      }

      // Accuracy circle via GeoJSON source
      const circle = makeAccuracyCircle(longitude, latitude, accuracy);
      if (map.getSource("accuracy")) {
        map.getSource("accuracy").setData(circle);
      } else {
        map.addSource("accuracy", { type: "geojson", data: circle });
        map.addLayer({
          id: "accuracy-fill",
          type: "fill",
          source: "accuracy",
          paint: {
            "fill-color": "#3b82f6",
            "fill-opacity": 0.12,
          },
        }, "trees-stems"); // insert below trees
        map.addLayer({
          id: "accuracy-border",
          type: "line",
          source: "accuracy",
          paint: {
            "line-color": "#3b82f6",
            "line-width": 1,
            "line-opacity": 0.4,
          },
        }, "trees-stems");
      }

      setStatus("");
    },
    () => {
      setStatus("Standort konnte nicht ermittelt werden.");
      stopLocating();
    },
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function stopLocating() {
  locating = false;
  locateBtn.classList.remove("active");
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  if (locationMarker) {
    locationMarker.remove();
    locationMarker = null;
  }
  if (map.getSource("accuracy")) {
    map.removeLayer("accuracy-fill");
    map.removeLayer("accuracy-border");
    map.removeSource("accuracy");
  }
}

// Approximate a circle as a GeoJSON polygon
function makeAccuracyCircle(lng, lat, radiusMeters) {
  const points = 64;
  const coords = [];
  const earthRadius = 6371000;
  for (let i = 0; i <= points; i++) {
    const angle = (i / points) * 2 * Math.PI;
    const dLat  = (radiusMeters / earthRadius) * (180 / Math.PI);
    const dLng  = dLat / Math.cos(lat * Math.PI / 180);
    coords.push([lng + dLng * Math.sin(angle), lat + dLat * Math.cos(angle)]);
  }
  return { type: "Feature", geometry: { type: "Polygon", coordinates: [coords] } };
}

// ── Event listeners ───────────────────────────────────────────────────
locateBtn.addEventListener("click", startLocating);

function scheduleFetch() {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(fetchTrees, 400);
}

map.on("load", () => {
  loadGroups();
  fetchTrees();
});

map.on("moveend", scheduleFetch);
groupSel.addEventListener("change", fetchTrees);
yearFrom.addEventListener("change", fetchTrees);
yearTo.addEventListener("change", fetchTrees);
</script>
</body>
</html>
