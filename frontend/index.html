<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bäume in Wien</title>
  <meta name="description" content="Alle Bäume aus dem Wiener Baumkataster." />
  <meta name="application-name" content="Bäume in Wien" />
  <meta name="apple-mobile-web-app-title" content="Bäume in Wien" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <h1>Bäume in Wien</h1>
  <div id="controls">
    <div id="filters">
      <div id="group-dropdown" class="custom-select">
        <div id="group-selected" class="custom-select-selected">
          <span class="dot" style="background:#9ca3af"></span>
          <span class="label">Alle Baumarten</span>
        </div>
        <div id="group-options" class="custom-select-options hidden">
          <div class="custom-option" data-value="" data-color="#9ca3af">
            <span class="dot" style="background:#9ca3af"></span>Alle Baumarten
          </div>
          <!-- named anchor for insertion -->
          <div id="andere-option" class="custom-option" data-value="Andere" data-color="#d1d5db">
            <span class="dot" style="background:#d1d5db"></span>Andere Baumarten
          </div>
        </div>
      </div>
      <div id="year-inputs">
        <input type="number" id="year-from" placeholder="Jahr von" min="1800" max="2030" />
        <input type="number" id="year-to" placeholder="Jahr bis" min="1800" max="2030" />
      </div>
    </div>
    <button id="locate-btn">Standort</button>
  </div>
</header>

<div id="map-wrap">
  <div id="map"></div>
  <div id="status" class="hidden"></div>
  <div id="popup-card" class="hidden">
    <div id="popup-species"></div>
    <div id="popup-details"></div>
  </div>
</div>

<script>
const API = "https://trees.maxheinze.eu/api";
const MOBILE_BREAKPOINT = 768;

const GROUP_COLORS = {
  "Ahorn":    "#93c5fd",
  "Linde":    "#fde047",
  "Eiche":    "#86efac",
  "Platane":  "#6ee7b7",
  "Kastanie": "#fcd34d",
  "Kirsche":  "#f9a8d4",
  "Esche":    "#7dd3fc",
  "Birke":    "#e5e7eb",
  "Pappel":   "#a7f3d0",
  "Pflaume":  "#c4b5fd",
};
const DEFAULT_COLOR = "#d1d5db";

function groupColor(g) {
  return (g && GROUP_COLORS[g]) || DEFAULT_COLOR;
}
function isMobile() {
  return window.innerWidth < MOBILE_BREAKPOINT;
}

// ── Custom dropdown ───────────────────────────────────────────────────
let selectedGroup = "";

const selectedEl = document.getElementById("group-selected");
const optionsEl  = document.getElementById("group-options");

function setSelectedGroup(value, label, color) {
  selectedGroup = value;
  selectedEl.querySelector(".dot").style.background = color;
  selectedEl.querySelector(".label").textContent = label;
  optionsEl.classList.add("hidden");
  fetchTrees();
}

selectedEl.addEventListener("click", e => {
  e.stopPropagation();
  optionsEl.classList.toggle("hidden");
});
document.addEventListener("click", () => optionsEl.classList.add("hidden"));
optionsEl.addEventListener("click", e => e.stopPropagation());
optionsEl.addEventListener("click", e => {
  const opt = e.target.closest(".custom-option");
  if (!opt) return;
  const dot = opt.querySelector(".dot");
  const label = opt.textContent.trim();
  setSelectedGroup(opt.dataset.value, label, opt.dataset.color);
});

async function loadGroups() {
  const res  = await fetch(`${API}/groups`);
  const data = await res.json();
  const anchor = document.getElementById("andere-option");
  data.groups.forEach(g => {
    const color = GROUP_COLORS[g] || DEFAULT_COLOR;
    const div   = document.createElement("div");
    div.className      = "custom-option";
    div.dataset.value  = g;
    div.dataset.color  = color;
    div.innerHTML      = `<span class="dot" style="background:${color}"></span>${g}`;
    optionsEl.insertBefore(div, anchor);
  });
}

// ── Map ───────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  center: [16.3738, 48.2082],
  zoom: 13,
  minZoom: 10,
});
map.addControl(new maplibregl.NavigationControl(), "top-right");

const statusEl  = document.getElementById("status");
const yearFrom  = document.getElementById("year-from");
const yearTo    = document.getElementById("year-to");
const popupCard = document.getElementById("popup-card");
const locateBtn = document.getElementById("locate-btn");

let fetchTimer     = null;
let watchId        = null;
let locationMarker = null;
let locating       = false;

// ── Tree sprite: dot + stem, no roundRect ─────────────────────────────
function makeTreeSprite(color, dotR) {
  const w      = dotR * 2;
  const stemW  = Math.max(2, dotR * 0.35);
  const stemH  = dotR * 1;
  const h      = dotR * 2 + stemH;

  const canvas  = document.createElement("canvas");
  canvas.width  = w;
  canvas.height = h;
  const ctx     = canvas.getContext("2d");

  // Stem
  ctx.fillStyle   = "#92400e";
  ctx.globalAlpha = 0.72;
  ctx.fillRect(w / 2 - stemW / 2, dotR * 2 - 2, stemW, stemH);
  ctx.globalAlpha = 1;

  // Dot fill
  ctx.beginPath();
  ctx.arc(w / 2, dotR - 1, dotR - 1.5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  return {
    data:   new Uint8Array(ctx.getImageData(0, 0, w, h).data.buffer),
    width:  w,
    height: h,
  };
}

function registerSprites() {
  const all = { ...GROUP_COLORS, "__default": DEFAULT_COLOR };
  Object.entries(all).forEach(([key, color]) => {
    const id = `tree-${key.toLowerCase().replace(/\s/g, "_")}`;
    if (!map.hasImage(id)) {
      map.addImage(id, makeTreeSprite(color, 12), { pixelRatio: 2 });
    }
  });
}

function spriteExpression() {
  const expr = ["match", ["get", "group"]];
  Object.keys(GROUP_COLORS).forEach(g => {
    expr.push(g, `tree-${g.toLowerCase()}`);
  });
  expr.push("tree-__default");
  return expr;
}

function colorExpression() {
  const expr = ["match", ["get", "group"]];
  Object.entries(GROUP_COLORS).forEach(([g, c]) => expr.push(g, c));
  expr.push(DEFAULT_COLOR);
  return expr;
}

// ── Fetch ─────────────────────────────────────────────────────────────
async function fetchTrees() {
  const bounds = map.getBounds();
  const params = new URLSearchParams({
    minlat: bounds.getSouth().toFixed(6),
    minlon: bounds.getWest().toFixed(6),
    maxlat: bounds.getNorth().toFixed(6),
    maxlon: bounds.getEast().toFixed(6),
  });
  if (selectedGroup)  params.set("group", selectedGroup);
  if (yearFrom.value) params.set("year_from", yearFrom.value);
  if (yearTo.value)   params.set("year_to", yearTo.value);

  setStatus("Lade…");
  try {
    const res  = await fetch(`${API}/trees?${params}`);
    const data = await res.json();
    if (data.error === "zoom") {
      setStatus("Bitte weiter heranzoomen.");
      clearTrees(); return;
    }
    if (data.count >= 2000) {
      setStatus("Vergrößern, um Bäume zu sehen.");
      clearTrees(); return;
    }
    renderTrees(data.trees);
    setStatus(`${data.count} Bäume`);
  } catch (err) {
    console.error(err);
    setStatus("Fehler beim Laden.");
  }
}

function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("hidden", !msg);
}

function clearTrees() {
  if (map.getSource("trees")) {
    map.getSource("trees").setData({ type: "FeatureCollection", features: [] });
  }
}

// ── Render ────────────────────────────────────────────────────────────
function renderTrees(trees) {
  const geojson = {
    type: "FeatureCollection",
    features: trees.map(t => ({
      type: "Feature",
      geometry: { type: "Point", coordinates: [t.lon, t.lat] },
      properties: t,
    })),
  };

  if (map.getSource("trees")) {
    map.getSource("trees").setData(geojson);
    return;
  }

  map.addSource("trees", { type: "geojson", data: geojson });

  // Dot+stem symbols at zoom 14+
  map.addLayer({
    id: "trees-symbols",
    type: "symbol",
    source: "trees",
    minzoom: 14,
    layout: {
      "icon-image": spriteExpression(),
      "icon-size": ["interpolate", ["linear"], ["zoom"], 14, 0.9, 18, 1.8],
      "icon-allow-overlap": true,
      "icon-anchor": "bottom",
    },
  });

  // Plain circles at zoom < 14
  map.addLayer({
    id: "trees-circles",
    type: "circle",
    source: "trees",
    maxzoom: 14,
    paint: {
      "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 2, 13, 4],
      "circle-color": colorExpression(),
      "circle-stroke-width": 1,
      "circle-stroke-color": "rgba(0,0,0,0.15)",
    },
  });

  map.on("click", "trees-symbols", e => { e.preventDefault(); showPopup(e.features[0], e.point); });
  map.on("click", "trees-circles", e => { e.preventDefault(); showPopup(e.features[0], e.point); });
  map.on("mouseenter", "trees-symbols", () => map.getCanvas().style.cursor = "pointer");
  map.on("mouseleave", "trees-symbols", () => map.getCanvas().style.cursor = "");
  map.on("mouseenter", "trees-circles", () => map.getCanvas().style.cursor = "pointer");
  map.on("mouseleave", "trees-circles", () => map.getCanvas().style.cursor = "");
  map.on("click", e => {
    const hits = map.queryRenderedFeatures(e.point, { layers: ["trees-symbols", "trees-circles"] });
    if (!hits.length) closePopup();
  });
}

// ── Popup ─────────────────────────────────────────────────────────────
function showPopup(feature, point) {
  const p = feature.properties;
  document.getElementById("popup-species").textContent = p.species || "Unbekannte Art";

  const fields = [
    ["📅 Gepflanzt",   p.year_planted || null],
    ["📏 Höhe",        p.height_class || null],
    ["🌿 Krone",       p.crown_diameter || null],
    ["🪵 Stammumfang", p.trunk_circumference ? `${p.trunk_circumference} cm` : null],
  ];

  const detailsEl = document.getElementById("popup-details");
  detailsEl.innerHTML = "";
  fields.forEach(([label, value]) => {
    if (!value) return;
    const row = document.createElement("div");
    row.className = "popup-row";
    row.innerHTML = `<span class="popup-label">${label}</span><span class="popup-value">${value}</span>`;
    detailsEl.appendChild(row);
  });

  popupCard.style.borderTop = `4px solid ${groupColor(p.group)}`;
  popupCard.classList.remove("hidden");

  if (isMobile()) {
    // CSS handles position; pan so tree is centered in visible area above popup
    requestAnimationFrame(() => {
      const mapWrapEl = document.getElementById("map-wrap");
      const popupH    = popupCard.offsetHeight;
      const bottomGap = 72; // matches CSS bottom
      const visibleH  = mapWrapEl.offsetHeight - popupH - bottomGap;

      const coords    = feature.geometry.coordinates;
      const treePx    = map.project(coords);
      // Shift center so tree lands at middle of visible strip
      const mapCenterPx = map.project(map.getCenter());
      const mapMidY     = mapWrapEl.offsetHeight / 2;
      const targetY     = visibleH / 2; // where we want tree on screen
      const dy          = treePx.y - targetY; // how many px to shift center down
      map.easeTo({
        center: map.unproject([mapCenterPx.x, mapCenterPx.y + (treePx.y - (mapWrapEl.offsetHeight / 2 - (mapWrapEl.offsetHeight / 2 - visibleH / 2)))]),
        duration: 350,
      });
    });
  } else {
    positionPopupNearPoint(point);
  }
}

function positionPopupNearPoint(point) {
  popupCard.style.left      = "-9999px";
  popupCard.style.top       = "-9999px";
  popupCard.style.transform = "none";

  const mapWrap = document.getElementById("map-wrap");
  const wrapW   = mapWrap.offsetWidth;
  const wrapH   = mapWrap.offsetHeight;
  const cardW   = popupCard.offsetWidth;
  const cardH   = popupCard.offsetHeight;
  const gap     = 14;
  const margin  = 12;
  const dotR    = 12;

  let top  = point.y + dotR + gap;
  if (top + cardH > wrapH - margin) top = point.y - dotR - gap - cardH;
  top = Math.max(margin, top);

  let left = point.x - cardW / 2;
  left = Math.max(margin, Math.min(left, wrapW - cardW - margin));

  popupCard.style.left = `${left}px`;
  popupCard.style.top  = `${top}px`;
}

function closePopup() {
  popupCard.classList.add("hidden");
}

// ── Live location ─────────────────────────────────────────────────────
function startLocating() {
  if (!navigator.geolocation) { alert("Geolokalisierung wird nicht unterstützt."); return; }
  if (locating) { stopLocating(); return; }
  locating = true;
  locateBtn.classList.add("active");
  setStatus("Standort wird ermittelt…");
  let firstFix = true;

  watchId = navigator.geolocation.watchPosition(
    pos => {
      const { longitude, latitude, accuracy } = pos.coords;
      const lngLat = [longitude, latitude];
      if (firstFix) {
        map.flyTo({ center: lngLat, zoom: 17, duration: 800 });
        firstFix = false;
      }
      if (!locationMarker) {
        const el = document.createElement("div");
        el.className = "location-dot";
        locationMarker = new maplibregl.Marker({ element: el, anchor: "center" })
          .setLngLat(lngLat).addTo(map);
      } else {
        locationMarker.setLngLat(lngLat);
      }
      const circle = makeAccuracyCircle(longitude, latitude, accuracy);
      if (map.getSource("accuracy")) {
        map.getSource("accuracy").setData(circle);
      } else {
        map.addSource("accuracy", { type: "geojson", data: circle });
        const below = map.getLayer("trees-circles") ? "trees-circles" : undefined;
        map.addLayer({ id: "accuracy-fill", type: "fill", source: "accuracy",
          paint: { "fill-color": "#3b82f6", "fill-opacity": 0.1 } }, below);
        map.addLayer({ id: "accuracy-border", type: "line", source: "accuracy",
          paint: { "line-color": "#3b82f6", "line-width": 1, "line-opacity": 0.35 } }, below);
      }
      setStatus("");
    },
    () => { setStatus("Standort konnte nicht ermittelt werden."); stopLocating(); },
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function stopLocating() {
  locating = false;
  locateBtn.classList.remove("active");
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  if (locationMarker)   { locationMarker.remove(); locationMarker = null; }
  if (map.getSource("accuracy")) {
    map.removeLayer("accuracy-fill");
    map.removeLayer("accuracy-border");
    map.removeSource("accuracy");
  }
}

function makeAccuracyCircle(lng, lat, r) {
  const pts = 64, R = 6371000, coords = [];
  for (let i = 0; i <= pts; i++) {
    const a = (i / pts) * 2 * Math.PI;
    const dLat = (r / R) * (180 / Math.PI);
    const dLng = dLat / Math.cos(lat * Math.PI / 180);
    coords.push([lng + dLng * Math.sin(a), lat + dLat * Math.cos(a)]);
  }
  return { type: "Feature", geometry: { type: "Polygon", coordinates: [coords] } };
}

// ── Init ──────────────────────────────────────────────────────────────
function scheduleFetch() {
  clearTimeout(fetchTimer);
  fetchTimer = setTimeout(fetchTrees, 400);
}

locateBtn.addEventListener("click", startLocating);
yearFrom.addEventListener("change", fetchTrees);
yearTo.addEventListener("change", fetchTrees);

map.on("load", () => {
  registerSprites();
  loadGroups();
  fetchTrees();
});

map.on("moveend", scheduleFetch);
</script>
</body>
</html>
